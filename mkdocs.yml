site_name: 编译原理 (复旦大学 2026年春季学期)
site_url: https://tea-compiler.github.io/

theme:
  name: material
  language: zh
  static_templates:
    - 404.html
  include_search_page: false
  search_index_only: true
  custom_dir: overrides

  features:
    - header.autohide
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - content.code.annotate

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode

  font:
    text: Roboto Slab
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - attr_list
  - md_in_html
  - footnotes

plugins:
  - search:
      lang:
        - zh
        - en
  - git-revision-date:
  - minify:
      minify_html: true
  - open-in-new-tab:

nav:
  - 课程信息: "index.md"
  - Rust 介绍（上）: "project/rust-intro.md"
  - Rust 介绍（下）: "project/rust-intro-2.md"
  - 实验总览: "project/overview.md"
  - 实验一 解析抽象语法树 : "project/asmt1.md"
  - 实验二 类型推断 : "project/asmt2.md"
  - 实验三 中间表示生成 : "project/asmt3.md"